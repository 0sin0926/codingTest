name: Remove Codetree READMEs

on:
  push:
    branches: [ main ] # 본인의 기본 브랜치 이름 (main 또는 master)

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Delete all README.md files except root
        run: |
          # 최상위(루트) README는 남겨두고, 하위 폴더에 있는 README.md만 골라서 삭제
          find . -mindepth 2 -name "README.md" -delete

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 변경사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || (git commit -m "Chore: Remove auto-generated READMEs" && git push)
